name: Daily News

on:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:
  repository_dispatch:
    # 外部から API で叩ける
    types: [ daily-news ]
jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: python daily_news.py
        env:
          WEBSHARE_USERNAME: ${{ secrets.WEBSHARE_USERNAME }}
          WEBSHARE_PASSWORD: ${{ secrets.WEBSHARE_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Click-tracking (optional — if either is unset, daily_news.py
          # silently falls back to the original URL in email links).
          CLICK_SIGNING_SECRET: ${{ secrets.CLICK_SIGNING_SECRET }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          # Embeddings for similarity ranking (optional — if unset, articles
          # are saved with embedding = NULL; backfill later).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
