<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal AI Newspaper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      padding: 24px 16px;
    }

    .wrapper {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      border-radius: 12px 12px 0 0;
      padding: 32px 36px 28px;
      color: white;
    }
    .header-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .header-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .header-meta {
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: #94a3b8;
    }
    .header-meta span { display: flex; align-items: center; gap: 5px; }

    /* ── Body ── */
    .body {
      background: white;
      padding: 28px 36px;
    }

    /* ── Article card ── */
    .article {
      border: 1px solid #e8ecf0;
      border-radius: 10px;
      padding: 20px 22px;
      margin-bottom: 16px;
      transition: box-shadow 0.15s;
    }
    .article:last-child { margin-bottom: 0; }

    .article-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    /* Category pill */
    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .pill-ai    { background: #ede9fe; color: #6d28d9; }
    .pill-fe    { background: #dbeafe; color: #1d4ed8; }
    .pill-st    { background: #dcfce7; color: #15803d; }
    .pill-ca    { background: #fff7ed; color: #c2410c; }
    .pill-tn    { background: #f3f4f6; color: #374151; }

    /* Importance stars */
    .stars {
      font-size: 13px;
      letter-spacing: 1px;
      color: #f59e0b;
      margin-left: auto;
    }

    .article-title {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    /* Fields */
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 3px;
    }
    .field-body {
      font-size: 13.5px;
      line-height: 1.65;
      color: #374151;
    }

    .source-link {
      display: inline-block;
      margin-top: 12px;
      font-size: 12px;
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
    }
    .source-link:hover { text-decoration: underline; }

    /* Divider between importance groups */
    .group-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #9ca3af;
      padding: 16px 0 10px;
      border-top: 1px solid #f3f4f6;
      margin-top: 8px;
    }
    .group-heading:first-child { border-top: none; padding-top: 0; margin-top: 0; }

    /* ── Footer ── */
    .footer {
      background: #f8fafc;
      border-top: 1px solid #e8ecf0;
      border-radius: 0 0 12px 12px;
      padding: 20px 36px;
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
    }
    .footer strong { color: #6b7280; }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Header -->
    <div class="header">
      <div class="header-label">Daily Intelligence Briefing</div>
      <div class="header-title">Personal AI Newspaper</div>
      <div class="header-meta">
        <span>📅 $date</span>
        <span>📰 $article_count 記事</span>
      </div>
    </div>

    <!-- Articles -->
    <div class="body">
      $articles_html
    </div>

    <!-- Footer -->
    <div class="footer">
      <strong>$source_count sources</strong> &nbsp;·&nbsp; Generated by Personal AI Newspaper
    </div>

  </div>
</body>
</html>
